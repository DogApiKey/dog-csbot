upstream csbot_server {
    ip_hash;
    server server:3000;
}

server {
    listen 80;
    server_name _;

    # Admin dashboard
    location /admin {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Chat widget static files (served by admin build)
    location /widget {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
    }

    # API and SSE
    location /api {
        proxy_pass http://csbot_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Timeouts for SSE
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check
    location /health {
        proxy_pass http://csbot_server;
        proxy_set_header Host $host;
    }

    # Default: serve admin dashboard
    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
